{% extends "base.html" %}

{% block title %}Prices | Figure Collection{% endblock %}

{% block content %}
<header class="page-header">
  <div>
    <p class="eyebrow">価格履歴</p>
    <h1>Prices</h1>
  </div>
</header>

<section class="split-layout">
  <form id="priceForm" class="panel form-panel">
    <div class="panel-head">
      <div>
        <h2>Add Price Record</h2>
        <p>不同平台、日期、状态都可以独立记录</p>
      </div>
    </div>
    <label>
      <span>Figure</span>
      <select id="figureSelect" name="figure_id" class="control" required></select>
    </label>
    <label>
      <span>Shop</span>
      <input name="shop_name" class="control" placeholder="あみあみ / 駿河屋 / メルカリ" required>
    </label>
    <label>
      <span>Price</span>
      <input name="price" class="control" type="number" min="0" step="1" required>
    </label>
    <div class="field-grid">
      <label>
        <span>Condition</span>
        <select name="condition" class="control">
          <option value="new">new</option>
          <option value="used">used</option>
        </select>
      </label>
      <label>
        <span>Stock</span>
        <input name="stock_status" class="control" placeholder="予約中 / 在庫あり">
      </label>
    </div>
    <label>
      <span>Date</span>
      <input name="checked_date" class="control" type="date" required>
    </label>
    <label>
      <span>URL</span>
      <input name="product_url" class="control" type="url" placeholder="https://">
    </label>
    <button class="button primary" type="submit">Save Price</button>
  </form>

  <section class="panel table-panel">
    <div class="panel-head">
      <div>
        <h2>Price Records</h2>
        <p id="priceCount">Loading</p>
      </div>
      <select id="priceFigureFilter" class="control compact" aria-label="Filter price records by figure"></select>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>商品</th>
            <th>店铺</th>
            <th>价格</th>
            <th>状态</th>
            <th>库存</th>
            <th>日期</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="pricesTable"></tbody>
      </table>
    </div>
  </section>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/prices.js') }}"></script>
{% endblock %}
