{% extends "base.html" %}

{% block title %}Collection | Figure Collection{% endblock %}

{% block content %}
<header class="page-header">
  <div>
    <p class="eyebrow" data-i18n="collection.eyebrow">所有状況管理</p>
    <h1 data-i18n="collection.title">Collection</h1>
  </div>
</header>

<section class="panel filters" aria-label="Collection filters" data-i18n-aria-label="aria.collectionFilters">
  <label>
    <span data-i18n="common.status">Status</span>
    <select id="ownershipFilter" class="control"></select>
  </label>
  <label>
    <span data-i18n="common.brand">Brand</span>
    <select id="brandFilter" class="control"></select>
  </label>
  <button id="clearCollectionFilters" class="button secondary" type="button" data-i18n="common.reset">Reset</button>
</section>

<section class="panel table-panel">
  <div class="panel-head">
    <div>
      <h2 data-i18n="collection.records">Collection Records</h2>
      <p id="collectionCount" data-i18n="common.loading">Loading</p>
    </div>
  </div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th data-i18n="table.figure">商品</th>
          <th data-i18n="common.status">状態</th>
          <th data-i18n="table.purchasePrice">購入価格</th>
          <th data-i18n="table.purchaseShop">購入平台</th>
          <th data-i18n="table.purchaseDate">購入日</th>
          <th data-i18n="table.opened">開封</th>
          <th data-i18n="collection.displayLocation">展示場所</th>
          <th data-i18n="table.memo">メモ</th>
          <th data-i18n="table.actions">操作</th>
        </tr>
      </thead>
      <tbody id="collectionTable"></tbody>
    </table>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/collection.js') }}"></script>
{% endblock %}
