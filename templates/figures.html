{% extends "base.html" %}

{% block title %}Figures | Figure Collection{% endblock %}

{% block content %}
<header class="page-header">
  <div>
    <p class="eyebrow" data-i18n="figures.eyebrow">商品マスター</p>
    <h1 data-i18n="figures.title">Figures</h1>
  </div>
  <button id="clearFilters" class="button secondary" type="button" data-i18n="common.reset">Reset</button>
</header>

<section class="panel filters" aria-label="Figure filters" data-i18n-aria-label="aria.figureFilters">
  <label>
    <span data-i18n="common.search">Search</span>
    <input id="keyword" class="control" type="search" placeholder="商品名 / 作品 / ブランド" data-i18n-placeholder="figures.searchPlaceholder">
  </label>
  <label>
    <span data-i18n="common.brand">Brand</span>
    <select id="brand" class="control"></select>
  </label>
  <label>
    <span data-i18n="common.series">Series</span>
    <select id="series_title" class="control"></select>
  </label>
  <label>
    <span data-i18n="common.price">Price</span>
    <select id="priceRange" class="control">
      <option value="" data-i18n="common.all">All</option>
      <option value="0-5000" data-i18n="figures.priceUnder5000">5000円以下</option>
      <option value="0-10000" data-i18n="figures.priceUnder10000">10000円以下</option>
      <option value="10000-" data-i18n="figures.priceOver10000">10000円以上</option>
    </select>
  </label>
  <label>
    <span data-i18n="common.limited">Limited</span>
    <select id="is_limited" class="control">
      <option value="" data-i18n="common.all">All</option>
      <option value="1" data-i18n="status.limited">限定</option>
      <option value="0" data-i18n="status.regular">一般</option>
    </select>
  </label>
  <label>
    <span data-i18n="figures.articulation">Articulation</span>
    <select id="is_articulated" class="control">
      <option value="" data-i18n="common.all">All</option>
      <option value="1" data-i18n="status.articulated">可動</option>
      <option value="0" data-i18n="status.fixed">不可動</option>
    </select>
  </label>
</section>

<section class="panel table-panel">
  <div class="panel-head">
    <div>
      <h2 data-i18n="figures.productList">Product List</h2>
      <p id="resultCount" data-i18n="common.loading">Loading</p>
    </div>
  </div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th data-i18n="table.figureName">商品名</th>
          <th data-i18n="common.brand">ブランド</th>
          <th data-i18n="common.series">作品</th>
          <th data-i18n="table.manufacturer">メーカー</th>
          <th data-i18n="table.release">発売</th>
          <th data-i18n="common.price">価格</th>
          <th data-i18n="table.attributes">属性</th>
          <th data-i18n="common.status">状態</th>
          <th data-i18n="table.actions">操作</th>
        </tr>
      </thead>
      <tbody id="figuresTable"></tbody>
    </table>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/figures.js') }}"></script>
{% endblock %}
