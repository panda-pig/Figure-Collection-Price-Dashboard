<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Figure Collection Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="Main navigation">
      <a class="brand-mark" href="/">
        <span class="brand-symbol">FC</span>
        <span>
          <strong>Figure Console</strong>
          <small data-i18n="brand.subtitle">Collection & Price</small>
        </span>
      </a>
      <nav class="nav-list">
        <a class="{{ 'active' if page == 'dashboard' else '' }}" href="/" data-i18n="nav.dashboard">Dashboard</a>
        <a class="{{ 'active' if page == 'figures' else '' }}" href="/figures" data-i18n="nav.figures">Figures</a>
        <a class="{{ 'active' if page == 'collection' else '' }}" href="/collection" data-i18n="nav.collection">Collection</a>
        <a class="{{ 'active' if page == 'prices' else '' }}" href="/prices" data-i18n="nav.prices">Prices</a>
      </nav>
      <div class="sidebar-bottom">
        <div class="language-panel" aria-label="Language">
          <span data-i18n="language.label">Language</span>
          <div class="language-switch" role="group" aria-label="Language switcher">
            <button class="language-button" type="button" data-lang="zh">中文</button>
            <button class="language-button" type="button" data-lang="ja">日本語</button>
            <button class="language-button" type="button" data-lang="en">EN</button>
          </div>
        </div>
        <div class="sidebar-note">
          <span>SQLite</span>
          <span>Flask API</span>
          <span>ECharts</span>
        </div>
      </div>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
